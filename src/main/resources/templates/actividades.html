<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Actividades</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: #F5F7FA;
            font-family: 'Poppins', sans-serif;
        }

        .navbar {
            background: #2C3E50;
            padding: 14px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-link-custom {
            color: #dfe6e9;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.92rem;
        }

        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link-custom.active {
            background: #6BBF59;
            color: white;
        }

        .card {
            border: none;
            border-radius: 14px;
        }

        .btn-save {
            background: #6BBF59;
            color: white;
            border: none;
        }

        .btn-save:hover {
            background: #5aa94b;
            color: white;
        }

        .table thead {
            background: #4F6D7A;
            color: white;
        }
    </style>

</head>

<body>


    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-mortarboard-fill"></i>
                Sistema Escolar
            </a>

            <div class="d-flex gap-2 flex-wrap">

                <a href="/" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-people"></i>
                    Estudiantes

                </a>

                <a href="/notas" class="nav-link-custom">

                    <i class="bi bi-journal-check"></i>
                    Notas

                </a>

                <a href="/asistencia" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-calendar-check"></i>
                    Asistencia

                </a>

                <a href="/fechas" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-list-check"></i>
                    Fechas

                </a>

                <a href="/report" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-bar-chart-line"></i>
                    Reportes

                </a>

                <a href="/actividades" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-list-task"></i>
                    Actividades

                </a>

                <a href="/logout" class="nav-link-custom">

                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar sesión

                </a>


            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <!-- FORMULARIO -->
                <div class="card shadow">

                    <div class="card-body p-4">

                        <h3 class="mb-4 text-center">
                            Gestión de Actividades
                        </h3>

                        <form th:action="@{/actividades/save}" th:object="${actividad}" method="post">

                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Nombre de actividad
                                </label>

                                <input type="text" th:field="*{nombre}" class="form-control"
                                    placeholder="Ejemplo: Examen" required>

                            </div>

                            <div class="d-grid">

                                <button type="submit" class="btn btn-save">

                                    Guardar Actividad

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

                <!-- TABLA -->
                <div class="card shadow mt-4">

                    <div class="card-body">

                        <h5 class="mb-4">
                            Listado de Actividades
                        </h5>

                        <div class="table-responsive">

                            <table class="table table-hover align-middle">

                                <thead>

                                    <tr>

                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Acciones</th>

                                    </tr>

                                </thead>

                                <tbody>

                                    <tr th:each="actividad : ${actividades}">

                                        <td th:text="${actividad.id}">
                                        </td>

                                        <td th:text="${actividad.nombre}">
                                        </td>

                                        <td>

                                            <a th:href="@{/actividades/delete/{id}(id=${actividad.id})}"
                                                class="btn btn-danger btn-sm">

                                                Eliminar

                                            </a>

                                        </td>

                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
