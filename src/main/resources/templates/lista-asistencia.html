<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <title>Lista de Asistencias</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            background: #F5F7FA;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: #2C3E50;
            padding: 14px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-link-custom {
            color: #dfe6e9;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.92rem;
        }

        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link-custom.active {
            background: #6BBF59;
            color: white;
        }

        .card {
            border: none;
            border-radius: 16px;
        }

        .table {
            border-radius: 12px;
            overflow: hidden;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-mortarboard-fill"></i>
                Sistema Escolar
            </a>

            <div class="d-flex gap-2 flex-wrap">

                <a href="/"
                   class="nav-link-custom"
                   sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-people"></i>
                    Estudiantes

                </a>

                <a href="/notas" class="nav-link-custom">

                    <i class="bi bi-journal-check"></i>
                    Notas

                </a>

                <a href="/asistencia"
                   class="nav-link-custom"
                   sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-calendar-check"></i>
                    Asistencia

                </a>

                <a href="/fechas"
                   class="nav-link-custom"
                   sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-list-check"></i>
                    Fechas

                </a>

                <a href="/report"
                   class="nav-link-custom"
                   sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-bar-chart-line"></i>
                    Reportes

                </a>

                <a href="/logout" class="nav-link-custom">

                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar sesión

                </a>

            </div>

        </div>

    </nav>

    <!-- CONTENIDO -->
    <div class="container mt-5">

        <div class="card shadow-sm p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="mb-0">
                    Historial de Asistencias
                </h2>

                <a href="/asistencia" class="btn btn-success">

                    <i class="bi bi-plus-circle me-2"></i>
                    Nueva Asistencia

                </a>

            </div>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                        <tr>

                            <th>Estudiante</th>
                            <th>Fecha</th>
                            <th>Estado</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="a : ${asistencias}">

                            <td th:text="${a.estudiante.name}"></td>

                            <td th:text="${a.fecha}"></td>

                            <td>

                                <span th:text="${a.estado}"
                                    th:classappend="${a.estado == 'Presente'}
                                    ? 'text-success fw-bold'
                                    : 'text-danger fw-bold'">
                                </span>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
