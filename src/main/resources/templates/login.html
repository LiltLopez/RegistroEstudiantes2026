<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#F5F7FA;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family: Arial,sans-serif;
        }

        .card{
            width:400px;
            border:none;
            border-radius:15px;
        }

        .btn-login{
            background:#4F6D7A;
            color:white;
            border:none;
        }

        .btn-login:hover{
            background:#3B5661;
            color:white;
        }

    </style>

</head>
<body>

<div class="card shadow p-4">

    <h2 class="text-center mb-4">
        Sistema Escolar
    </h2>



    <div th:if="${param.error}"
         class="alert alert-danger">

        Usuario o contraseña incorrectos

    </div>



    <div th:if="${param.logout}"
         class="alert alert-success">

        Sesión cerrada correctamente

    </div>


    <form th:action="@{/login}"
          method="post">

        <div class="mb-3">

            <label>
                Usuario
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Ingrese usuario"
                   required>

        </div>

        <div class="mb-3">

            <label>
                Contraseña
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Ingrese contraseña"
                   required>

        </div>

        <button class="btn btn-login w-100">

            Iniciar Sesión

        </button>

    </form>

</div>

</body>
</html>
